
# Aqui es donde esta la configuracion de animaciones del sistema

animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.02, 1,    0.32, 1
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = border,        1,     5.39,  myBezier
    animation = windows,       1,     5,  myBezier, popin
    animation = windowsIn,     1,     5,   myBezier, popin
    animation = windowsOut,    1,     1.49,  myBezier, popin
    animation = fadeIn,        1,     1.73,  myBezier
    animation = fadeOut,       1,     1.46,  myBezier
    animation = fade,          1,     3.03,  myBezier
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   myBezier,       fade
    animation = fadeLayersIn,  1,     1.79,  myBezier
    animation = fadeLayersOut, 1,     1.39,  myBezier
    animation = workspaces,    1,     4,  myBezier, slide
    animation = workspacesIn,  1,     4,  myBezier, slide
    animation = workspacesOut, 1,     4,  myBezier, slide
    animation = zoomFactor,    1,     7,     myBezier
}
